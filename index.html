<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>520 · 爱的拨号解码器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#0b0b12;
  overflow:hidden;
  font-family:'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  height:100vh;
  width:100vw;
  cursor:default;
}

canvas { display:block; position:absolute; top:0; left:0; }

.overlay {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  pointer-events:none;
  z-index:10;
  transition:opacity 0.6s ease, transform 0.6s ease;
}

#hook-overlay {
  top:min(80px, 14vh);
}

#hook-overlay .pitch {
  font-size:clamp(28px, 6vw, 38px);
  font-weight:700;
  color:#ff6b8a;
  text-shadow:0 0 30px rgba(255,107,138,0.5);
  letter-spacing:0.05em;
  line-height:1.4;
}

#hook-overlay .subtitle {
  font-size:clamp(14px, 3vw, 17px);
  color:rgba(255,255,255,0.6);
  margin-top:12px;
  font-weight:300;
  letter-spacing:0.08em;
}

#guide-overlay {
  bottom:min(100px, 20vh);
  opacity:0;
}

#guide-overlay .guide-text {
  font-size:clamp(14px, 3vw, 16px);
  color:rgba(255,255,255,0.75);
  font-weight:400;
  letter-spacing:0.05em;
}

#progress-dots {
  position:absolute;
  top:min(35px, 6vh);
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:18px;
  z-index:10;
  pointer-events:none;
}

.progress-dot {
  width:clamp(10px, 2vw, 14px);
  height:clamp(10px, 2vw, 14px);
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.25);
  transition:all 0.5s ease;
}

.progress-dot.locked {
  border-color:#ffd700;
  background:rgba(255,215,0,0.3);
  box-shadow:0 0 16px rgba(255,215,0,0.5);
}

.progress-dot.current {
  border-color:#ff6b8a;
  animation:dot-pulse 0.8s ease-in-out infinite;
}

@keyframes dot-pulse {
  0%,100% { box-shadow:0 0 8px rgba(255,107,138,0.3); }
  50% { box-shadow:0 0 20px rgba(255,107,138,0.7); }
}

#reveal-overlay {
  bottom:min(120px, 22vh);
  opacity:0;
  pointer-events:none;
  z-index:20;
}

#reveal-overlay .reveal-text {
  font-size:clamp(15px, 3.5vw, 20px);
  color:#ffd700;
  font-weight:500;
  letter-spacing:0.06em;
  text-shadow:0 0 20px rgba(255,215,0,0.4);
  line-height:1.6;
}

.center-message {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(32px, 10vw, 72px);
  font-weight:900;
  color:#ff6b8a;
  text-shadow:0 0 40px rgba(255,107,138,0.6), 0 0 80px rgba(255,107,138,0.3);
  z-index:5;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.8s ease, transform 0.8s ease;
  letter-spacing:0.08em;
  white-space:nowrap;
}

.center-message.complete {
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  animation:heartbeat 1.2s ease-in-out infinite;
}

@keyframes heartbeat {
  0%,100% { transform:translate(-50%,-50%) scale(1); }
  15% { transform:translate(-50%,-50%) scale(1.15); }
  30% { transform:translate(-50%,-50%) scale(1); }
  45% { transform:translate(-50%,-50%) scale(1.1); }
  60% { transform:translate(-50%,-50%) scale(1); }
}

.fade-out { opacity:0 !important; transform:translateX(-50%) translateY(-15px) !important; }
.fade-in { opacity:1 !important; }
</style>
</head>
<body>

<div id="progress-dots">
  <div class="progress-dot" data-idx="0"></div>
  <div class="progress-dot" data-idx="1"></div>
  <div class="progress-dot" data-idx="2"></div>
</div>

<div id="hook-overlay" class="overlay">
  <div class="pitch">有一种密码，全世界都说它是爱</div>
  <div class="subtitle">解锁密钥：5 — 2 — 0</div>
</div>

<div id="guide-overlay" class="overlay">
  <div class="guide-text">🔄 拖动拨盘，依次对准 5、2、0</div>
</div>

<div class="center-message" id="center-msg">我 ❤️ 你</div>

<div id="reveal-overlay" class="overlay">
  <div class="reveal-text">5, 2, 0。三个数字，一段密码<br>在二进制世界里，它是最古老的指令集</div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const centerMsg = document.getElementById('center-msg');
const hookOverlay = document.getElementById('hook-overlay');
const guideOverlay = document.getElementById('guide-overlay');
const revealOverlay = document.getElementById('reveal-overlay');
const progressDots = document.querySelectorAll('.progress-dot');

let W, H, CX, CY, dialRadius, pointerAngle;
let unlocked = [false, false, false];
let unlockSequence = [5, 2, 0];
let currentUnlockIndex = 0;
let currentNumber = -1;
let hoverTimer = null;
let hoverStartTime = 0;
let lockInProgress = false;

let particles = [];
let celebrationParticles = [];
let isCelebrating = false;
let celebrationStart = 0;

let stage = 'hook';
let dialAngle = 0; // radians, the dial's rotation
let targetDialAngle = 0;
let isDragging = false;
let dragStartAngle = 0;
let dragStartDialAngle = 0;

let time = 0;
let ringPulse = 0;

const NUM_POSITIONS = 10;
const SEGMENT = (Math.PI * 2) / NUM_POSITIONS;
const LOCK_TOLERANCE = SEGMENT * 0.35;
const HOVER_DURATION = 700; // ms to trigger lock

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
  
  const minDim = Math.min(W, H);
  dialRadius = Math.min(minDim * 0.35, 320);
}

function getNumberAtAngle(angle) {
  // angle 是 dialAngle，即拨盘顺时针旋转的角度
  // dialAngle = i * SEGMENT 时，数字 i 对准 12 点指针
  const normalized = ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  const num = Math.round(normalized / SEGMENT) % NUM_POSITIONS;
  return num;
}

function getAngleForNumber(num) {
  // dialAngle = num * SEGMENT 时数字 num 对准 12 点指针
  return (num * SEGMENT) % (Math.PI * 2);
}

function atan2pos(x, y) {
  let a = Math.atan2(y - CY, x - CX);
  if (a < 0) a += Math.PI * 2;
  return a;
}

function updateGuideVisibility() {
  if (stage === 'hook') {
    guideOverlay.classList.remove('fade-in');
    guideOverlay.style.opacity = '0';
  } else if (stage === 'guide' || stage === 'experience') {
    if (unlocked.every(v => v)) {
      guideOverlay.classList.remove('fade-in');
      guideOverlay.style.opacity = '0';
    } else {
      guideOverlay.classList.add('fade-in');
    }
  } else {
    guideOverlay.classList.remove('fade-in');
    guideOverlay.style.opacity = '0';
  }
}

function updateProgressDots() {
  progressDots.forEach((dot, i) => {
    dot.classList.remove('locked', 'current');
    if (unlocked[i]) dot.classList.add('locked');
    if (!unlocked[i] && i === currentUnlockIndex && stage === 'experience') dot.classList.add('current');
  });
}

function tryLock(num) {
  if (currentUnlockIndex >= 3) return;
  if (num === unlockSequence[currentUnlockIndex] && !lockInProgress) {
    lockInProgress = true;
    if (hoverTimer) clearTimeout(hoverTimer);
    hoverTimer = setTimeout(() => {
      unlocked[currentUnlockIndex] = true;
      updateProgressDots();
      
      for (let i = 0; i < 25; i++) {
        const ang = getAngleForNumber(num) + (Math.random() - 0.5) * 0.5;
        const dist = dialRadius + 15 + Math.random() * 40;
        const px = CX + Math.cos(ang) * dist;
        const py = CY - Math.sin(ang) * dist;
        spawnSpark(px, py, '#ffd700', 2 + Math.random() * 3);
      }
      
      ringPulse = 1;
      
      currentUnlockIndex++;
      lockInProgress = false;
      updateGuideVisibility();
      
      if (currentUnlockIndex >= 3) {
        setTimeout(startCelebration, 400);
      }
    }, HOVER_DURATION);
  }
}

function cancelLock() {
  if (hoverTimer) clearTimeout(hoverTimer);
  hoverTimer = null;
  lockInProgress = false;
}

function startCelebration() {
  isCelebrating = true;
  celebrationStart = time;
  centerMsg.classList.add('complete');
  
  for (let i = 0; i < 80; i++) {
    const ang = Math.random() * Math.PI * 2;
    const dist = 10 + Math.random() * 120;
    const px = CX + Math.cos(ang) * dist;
    const py = CY - Math.sin(ang) * dist;
    celebrationParticles.push({
      x: CX, y: CY,
      vx: Math.cos(ang) * (1.5 + Math.random() * 4),
      vy: -Math.sin(ang) * (1.5 + Math.random() * 4),
      life: 1, decay: 0.008 + Math.random() * 0.02,
      size: 1.5 + Math.random() * 4,
      hue: Math.random() < 0.6 ? '#ff6b8a' : (Math.random() < 0.5 ? '#ffd700' : '#ff9eb5'),
    });
  }
  
  guideOverlay.classList.remove('fade-in');
  guideOverlay.style.opacity = '0';
  
  setTimeout(() => {
    revealOverlay.classList.add('fade-in');
    stage = 'reveal';
  }, 1500);
}

function spawnSpark(x, y, color, size) {
  for (let i = 0; i < 6; i++) {
    const ang = Math.random() * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(ang) * (1 + Math.random() * 3),
      vy: -Math.sin(ang) * (1 + Math.random() * 3),
      life: 1, decay: 0.03 + Math.random() * 0.05,
      size: size * (0.5 + Math.random()),
      color,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  for (let i = celebrationParticles.length - 1; i >= 0; i--) {
    const p = celebrationParticles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.03 * dt;
    p.life -= p.decay;
    if (p.life <= 0) celebrationParticles.splice(i, 1);
  }
  
  if (isCelebrating && time - celebrationStart > 3500 && celebrationParticles.length < 30) {
    for (let i = 0; i < 15; i++) {
      const ang = Math.random() * Math.PI * 2;
      const px = CX + Math.cos(ang) * dialRadius * 0.5;
      const py = CY - Math.sin(ang) * dialRadius * 0.5;
      celebrationParticles.push({
        x: px, y: py,
        vx: Math.cos(ang) * (0.5 + Math.random() * 2),
        vy: -Math.sin(ang) * (0.5 + Math.random() * 2),
        life: 1, decay: 0.015 + Math.random() * 0.02,
        size: 1 + Math.random() * 3,
        hue: Math.random() < 0.5 ? '#ff6b8a' : '#ffd700',
      });
    }
  }
}

function drawBackground() {
  const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#141420');
  grad.addColorStop(1, '#0b0b12');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  for (let x = gridSize; x < W; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = gridSize; y < H; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
}

function drawDial() {
  ctx.save();
  
  const pulseScale = 1 + ringPulse * 0.04;
  ringPulse *= 0.92;
  
  // outer glow ring
  ctx.beginPath();
  ctx.arc(CX, CY, dialRadius + 30, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,107,138,${0.08 + Math.sin(time * 0.004) * 0.03})`;
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // main dial background
  const dialGrad = ctx.createRadialGradient(CX, CY, dialRadius * 0.6, CX, CY, dialRadius * pulseScale);
  dialGrad.addColorStop(0, 'rgba(20,20,32,0.9)');
  dialGrad.addColorStop(0.85, 'rgba(28,28,44,0.95)');
  dialGrad.addColorStop(1, 'rgba(40,40,60,0.8)');
  ctx.beginPath();
  ctx.arc(CX, CY, dialRadius * pulseScale, 0, Math.PI * 2);
  ctx.fillStyle = dialGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,107,138,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // inner ring
  ctx.beginPath();
  ctx.arc(CX, CY, dialRadius * 0.7, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.stroke();
  
  // tick marks and numbers
  for (let i = 0; i < NUM_POSITIONS; i++) {
    const ang = -i * SEGMENT + Math.PI / 2 + dialAngle;
    const cos = Math.cos(ang);
    const sin = Math.sin(ang);
    const outerR = dialRadius * 0.95;
    const innerR = dialRadius * 0.8;
    const numR = dialRadius * 0.7;
    
    const x1 = CX + cos * innerR;
    const y1 = CY - sin * innerR;
    const x2 = CX + cos * outerR;
    const y2 = CY - sin * outerR;
    
    const isTarget = (i === 5 || i === 2 || i === 0);
    const isUnlocked = unlocked[unlockSequence.indexOf(i)];
    const isCurrentTarget = !isUnlocked && i === unlockSequence[currentUnlockIndex];
    
    let tickColor, tickWidth;
    if (isUnlocked) {
      tickColor = 'rgba(255,215,0,0.8)';
      tickWidth = 2.5;
    } else if (isCurrentTarget) {
      tickColor = 'rgba(255,107,138,0.8)';
      tickWidth = 2.5;
    } else {
      tickColor = 'rgba(255,255,255,0.2)';
      tickWidth = 1;
    }
    
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = tickColor;
    ctx.lineWidth = tickWidth;
    ctx.stroke();
    
    // number
    const nx = CX + cos * numR;
    const ny = CY - sin * numR;
    const isCurrentNum = (getNumberAtAngle(dialAngle) === i);
    
    let numColor;
    if (isUnlocked) {
      numColor = '#ffd700';
    } else if (isCurrentTarget) {
      numColor = '#ff6b8a';
    } else {
      numColor = 'rgba(255,255,255,0.5)';
    }
    
    ctx.fillStyle = numColor;
    ctx.font = `bold ${Math.max(16, dialRadius * 0.09)}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(i), nx, ny);
    
    // glow for unlocked numbers
    if (isUnlocked) {
      ctx.beginPath();
      ctx.arc(nx, ny, dialRadius * 0.08, 0, Math.PI * 2);
      const glowGrad = ctx.createRadialGradient(nx, ny, 0, nx, ny, dialRadius * 0.12);
      glowGrad.addColorStop(0, 'rgba(255,215,0,0.2)');
      glowGrad.addColorStop(1, 'rgba(255,215,0,0)');
      ctx.fillStyle = glowGrad;
      ctx.fill();
    }
  }
  
  // pointer
  const pointerAng = Math.PI / 2;
  const pointerLen = dialRadius * 0.22;
  const pointerBase = dialRadius * 0.62;
  const px1 = CX + Math.cos(pointerAng) * pointerBase;
  const py1 = CY - Math.sin(pointerAng) * pointerBase;
  const px2 = CX + Math.cos(pointerAng - 0.15) * (pointerBase - 8);
  const py2 = CY - Math.sin(pointerAng - 0.15) * (pointerBase - 8);
  const px3 = CX + Math.cos(pointerAng + 0.15) * (pointerBase - 8);
  const py3 = CY - Math.sin(pointerAng + 0.15) * (pointerBase - 8);
  const pTip = CX + Math.cos(pointerAng) * (pointerBase + pointerLen);
  const pTipY = CY - Math.sin(pointerAng) * (pointerBase + pointerLen);
  
  ctx.beginPath();
  ctx.moveTo(px2, py2);
  ctx.lineTo(pTip, pTipY);
  ctx.lineTo(px3, py3);
  ctx.closePath();
  
  const ptrGrad = ctx.createLinearGradient(px1, py1, pTip, pTipY);
  ptrGrad.addColorStop(0, '#ff6b8a');
  ptrGrad.addColorStop(1, '#ff9eb5');
  ctx.fillStyle = ptrGrad;
  ctx.fill();
  
  ctx.shadowColor = 'rgba(255,107,138,0.6)';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // center circle
  const centerR = dialRadius * 0.15;
  const cGrad = ctx.createRadialGradient(CX, CY, 0, CX, CY, centerR);
  cGrad.addColorStop(0, '#1a1a2e');
  cGrad.addColorStop(1, '#0d0d1a');
  ctx.beginPath();
  ctx.arc(CX, CY, centerR, 0, Math.PI * 2);
  ctx.fillStyle = cGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,107,138,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      const r = parseInt(p.color.slice(1,3), 16);
      const g = parseInt(p.color.slice(3,5), 16);
      const b = parseInt(p.color.slice(5,7), 16);
      ctx.fillStyle = `rgba(${r},${g},${b},${p.life})`;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  
  for (const p of celebrationParticles) {
    let r=255,g=107,b=138;
    if (p.hue === '#ffd700') { r=255;g=215;b=0; }
    else if (p.hue === '#ff9eb5') { r=255;g=158;b=181; }
    ctx.fillStyle = `rgba(${r},${g},${b},${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawAmbientGlow() {
  if (!isCelebrating) return;
  const elapsed = time - celebrationStart;
  const intensity = Math.max(0, 1 - elapsed / 4000) * 0.25;
  
  const glow = ctx.createRadialGradient(CX, CY, dialRadius * 0.5, CX, CY, dialRadius * 1.5);
  glow.addColorStop(0, `rgba(255,107,138,${intensity})`);
  glow.addColorStop(1, 'rgba(255,107,138,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(CX, CY, dialRadius * 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function drawHoverIndicator() {
  if (stage !== 'experience' || lockInProgress !== true) return;
  if (!hoverTimer) return;
  const elapsed = performance.now() - hoverStartTime;
  const progress = Math.min(1, elapsed / HOVER_DURATION);
  
  const ang = Math.PI / 2;
  const r = dialRadius * 0.98;
  const startAng = ang - Math.PI * 0.4 * progress;
  const endAng = ang + Math.PI * 0.4 * progress;
  
  ctx.beginPath();
  ctx.arc(CX, CY, r, startAng, endAng);
  ctx.strokeStyle = `rgba(255,215,0,${0.5 + progress * 0.3})`;
  ctx.lineWidth = 3;
  ctx.shadowColor = `rgba(255,215,0,${0.6})`;
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function animate(timestamp) {
  const dt = Math.min(100, timestamp - (animate._lastTime || timestamp)) / 16.67;
  animate._lastTime = timestamp;
  time = timestamp;
  
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, W, H);
  
  // smooth dial rotation
  if (!isDragging && !isCelebrating) {
    dialAngle += (targetDialAngle - dialAngle) * 0.25;
  }
  
  // determine current number
  if (stage === 'experience') {
    const prev = currentNumber;
    currentNumber = getNumberAtAngle(dialAngle);
    
    if (currentNumber !== prev && !isCelebrating) {
      cancelLock();
      if (!unlocked[currentUnlockIndex] && currentNumber === unlockSequence[currentUnlockIndex]) {
        tryLock(currentNumber);
        hoverStartTime = performance.now();
      }
    }
  }
  
  drawBackground();
  drawAmbientGlow();
  drawDial();
  drawHoverIndicator();
  updateParticles(dt);
  drawParticles();
}

canvas.addEventListener('mousedown', (e) => {
  if (isCelebrating) return;
  
  const dx = e.clientX - CX;
  const dy = e.clientY - CY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  if (dist < dialRadius * 1.3 && dist > dialRadius * 0.2) {
    isDragging = true;
    dragStartAngle = atan2pos(e.clientX, e.clientY);
    dragStartDialAngle = dialAngle;
    
    if (stage === 'hook') {
      stage = 'guide';
      hookOverlay.classList.add('fade-out');
      updateGuideVisibility();
    } else if (stage === 'guide') {
      stage = 'experience';
      updateGuideVisibility();
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const currentAngle = atan2pos(e.clientX, e.clientY);
  let delta = currentAngle - dragStartAngle;
  if (delta > Math.PI) delta -= Math.PI * 2;
  if (delta < -Math.PI) delta += Math.PI * 2;
  
  targetDialAngle = dragStartDialAngle + delta;
  dialAngle = targetDialAngle;
});

canvas.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  targetDialAngle = dialAngle;
});

canvas.addEventListener('mouseleave', () => {
  if (isDragging) {
    isDragging = false;
    targetDialAngle = dialAngle;
  }
  cancelLock();
});

// touch
canvas.addEventListener('touchstart', (e) => {
  if (isCelebrating || e.touches.length !== 1) return;
  const touch = e.touches[0];
  const dx = touch.clientX - CX;
  const dy = touch.clientY - CY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  
  if (dist < dialRadius * 1.35 && dist > dialRadius * 0.15) {
    isDragging = true;
    dragStartAngle = atan2pos(touch.clientX, touch.clientY);
    dragStartDialAngle = dialAngle;
    
    if (stage === 'hook') {
      stage = 'guide';
      hookOverlay.classList.add('fade-out');
      updateGuideVisibility();
    } else if (stage === 'guide') {
      stage = 'experience';
      updateGuideVisibility();
    }
    e.preventDefault();
  }
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const currentAngle = atan2pos(e.touches[0].clientX, e.touches[0].clientY);
  let delta = currentAngle - dragStartAngle;
  if (delta > Math.PI) delta -= Math.PI * 2;
  if (delta < -Math.PI) delta += Math.PI * 2;
  
  targetDialAngle = dragStartDialAngle + delta;
  dialAngle = targetDialAngle;
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  targetDialAngle = dialAngle;
});

// keyboard for accessibility
document.addEventListener('keydown', (e) => {
  if (isCelebrating) return;
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    const step = SEGMENT * 0.5;
    targetDialAngle += (e.key === 'ArrowLeft' ? 1 : -1) * step;
    dialAngle = targetDialAngle;
    
    if (stage === 'hook') {
      stage = 'guide';
      hookOverlay.classList.add('fade-out');
      updateGuideVisibility();
    } else if (stage === 'guide') {
      stage = 'experience';
      updateGuideVisibility();
    }
  }
});

resize();
window.addEventListener('resize', resize);
updateProgressDots();
requestAnimationFrame(animate);

setTimeout(() => {
  if (stage === 'hook') {
    stage = 'guide';
    updateGuideVisibility();
  }
}, 3000);
</script>
</body>
</html>
